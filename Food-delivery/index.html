<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- header Part -->
    <header>
        <div class="Header-container flex wrapper between">
            <h1 class="web-name">QuickBite</h1>
            <div>
                <!-- DESKTOP-MENU -->
                <nav class="nav-bar">
                    <ul class="flex">
                        <li> <a href="#">Home</a></li>
                        <li> <a href="#">Menu</a></li>
                        <li> <a href="#">Service</a></li>
                        <li> <a href="#">About Us</a></li>
                        <li> <a href="#">Contacts</a></li>
                    </ul>
            </div>
            <div class="desktop-actions flex gap-3">
                <a href="#" class="cart-icon"><i class="fa-solid fa-cart-shopping">
                        <span class="cart-value">0</span></i></a>
                <a href="#" class="btn flex" style="color: #FFF;">Sign-in &nbsp;<i
                        class="fa-solid fa-right-to-bracket"></i> </a>
                <a href="#" class="bars"><i class="fa-solid fa-bars"></i></a>
            </div>

            <!-- Mobile-Menue -->
            <ul class="mobile-menue ">
                <li> <a href="#">Home</a></li>
                <li> <a href="#">Menu</a></li>
                <li> <a href="#">Service</a></li>
                <li> <a href="#">About Us</a></li>
                <li> <a href="#">Contacts</a></li>
                <li>
                    <a href="#" class="btn flex" style="color: #FFF;">Sign-in &nbsp;<i
                            class="fa-solid fa-right-to-bracket"></i> </a>
                </li>
        </div>
        </ul>
        </nav>
        </div>
    </header>

    <!-- Section-part -->
    <main>
        <section class="hero-section flex wrapper">
            <div class="content">
                <h1>Hungry? Your Favorite Food
                    <span>Delivered in Minutes!</span>
                </h1>
                <p class="para">Why step out? Snack smarter with Quick Bite at your fingertips.</p>
                <div class="flex gap-3 gap-2">
                    <a href="#" class="btn">Order Now</a>

                    <a href="#" class="social-icons">
                        <i class="fa-brands fa-instagram"></i>
                    </a>

                    <a href="#" class="social-icons">
                        <i class="fa-brands fa-facebook"></i>
                    </a>

                    <a href="#" class="social-icons">
                        <i class="fa-brands fa-x-twitter"></i>
                    </a>

                    <a href="#" class="social-icons">
                        <i class="fa-brands fa-google-plus-g"></i>
                    </a>
                </div>
            </div>
            <div class="img-container flex">
                <img src="img/img10.png" alt="">
            </div> 
        </section>
    </main>


    <!-- Footer-Part -->
    <footer>


    </footer>


    <script src="App.js"></script>
</body>

</html>
